<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantify - Admin Account</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="panel">
    <aside class="sidebar">
      <div class="brand" style="font-size:34px;">Plantify</div>
      <span class="soft" style="font-size: 13px; letter-spacing: 1px;">ADMIN PANEL</span>
      
      <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px; height: 100%;">
        <a class="side-link active" href="admin-dashboard.html">Account</a>
        <a class="side-link" href="admin-dashboard-recipes.html">Recipes</a>
        <a class="side-link" href="admin-dashboard-subscription.html">Subscriptions</a>
        <a class="side-link" href="admin-dashboard-chat.html">Chat</a>
        <a class="side-link" href="index.html">Back to Home</a>
        
        <a class="side-link" style="margin-top: auto; color: var(--accent);" href="login.html">
          <strong>Logout</strong>
        </a>
      </div>
    </aside>

    <main class="content">
      <p style="letter-spacing:1.5px; color:var(--accent); font-weight:700; margin-bottom: 0;">YOUR PROFILE</p>
      <h1 style="font-size:52px; margin-top:6px; margin-bottom: 24px;">Account Settings</h1>

      <section class="split">
        <div class="block">
          <h3>Profile Information</h3>
          <p class="soft" style="margin-top: -10px; margin-bottom: 20px;">Perbarui data diri dan status hak akses kamu di sini.</p>
          
          <form class="form-layout">
            <div class="field full">
              <label>Nama Lengkap</label>
              <input type="text" value="Dr. Sumanto Dragon" />
            </div>
            
            <div class="field full">
              <label>Alamat Email</label>
              <input type="email" value="SDragon@plantify.com" />
            </div>
            
            <div class="field full">
              <label>Status Peran</label>
              <select>
                <option value="admin">Administrator</option>
                <option value="nutritionist" selected>Ahli Gizi (Nutritionist)</option>
              </select>
            </div>
            
            <div class="field full" style="margin-top: 10px;">
              <button class="btn btn-primary" type="button">Simpan Perubahan</button>
            </div>
          </form>
        </div>

        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div class="block">
            <h3>Change Password</h3>
            <form class="form-layout">
              <div class="field full">
                <label>Password Saat Ini</label>
                <input type="password" placeholder="••••••••" />
              </div>
              <div class="field full">
                <label>Password Baru</label>
                <input type="password" placeholder="••••••••" />
              </div>
              <div class="field full" style="margin-top: 8px;">
                <button class="btn btn-primary" type="button" style="width: 100%;">Update Password</button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
