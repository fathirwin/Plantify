<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantify - Login & Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <main class="auth-container" id="authContainer">
    
    <div class="auth-form-container sign-up-container">
      <form class="auth-form" action="#">
        <h1 style="margin-bottom: 10px;">Buat Akun</h1>
        <div class="social-container">
          <a href="#" class="social-icon">f</a>
          <a href="#" class="social-icon">G+</a>
          <a href="#" class="social-icon">in</a>
        </div>
        <p class="soft" style="font-size: 13px; margin-bottom: 16px;">atau gunakan email anda untuk registrasi</p>
        
        <div class="field" style="width: 100%; margin-bottom: 12px;">
          <input type="text" placeholder="Nama" />
        </div>
        <div class="field" style="width: 100%; margin-bottom: 12px;">
          <input type="email" placeholder="Email" />
        </div>
        <div class="field" style="width: 100%; margin-bottom: 20px;">
          <input type="password" placeholder="Password" />
        </div>
        
        <button class="btn btn-primary" type="button" style="padding: 12px 36px; border-radius: 30px;">SIGN UP</button>
      </form>
    </div>

    <div class="auth-form-container sign-in-container">
      <form class="auth-form" action="#">
        <h1 style="margin-bottom: 10px;">Sign in</h1>
        <div class="social-container">
          <a href="#" class="social-icon">f</a>
          <a href="#" class="social-icon">G+</a>
          <a href="#" class="social-icon">in</a>
        </div>
        <p class="soft" style="font-size: 13px; margin-bottom: 16px;">atau gunakan akun anda</p>
        
        <div class="field" style="width: 100%; margin-bottom: 12px;">
          <input type="email" value="admin@gmail.com" placeholder="Email" />
        </div>
        <div class="field" style="width: 100%; margin-bottom: 12px;">
          <input type="password" value="password123" placeholder="Password" />
        </div>
        
        <a href="#" class="soft" style="font-size: 13px; margin-bottom: 20px; text-decoration: none;">Lupa kata sandi anda?</a>
        
        <div style="display:flex; gap:10px;">
          <button class="btn btn-primary" id="loginBtn" type="button" style="padding: 12px 36px; border-radius: 30px;">SIGN IN</button>
          <a class="btn btn-outline-dark" href="index.html" style="padding: 12px 24px; border-radius: 30px;">Back</a>
        </div>
      </form>
    </div>

    <div class="auth-overlay-container">
      <div class="auth-overlay">
        <div class="auth-overlay-panel auth-overlay-left">
          <h1 style="color: white; margin-bottom: 16px;">Selamat Datang Kembali!</h1>
          <p style="color: white; font-size: 15px; margin-bottom: 24px; line-height: 1.5;">Untuk tetap terhubung dengan kami,<br>silahkan masuk dengan akun anda</p>
          <button class="btn ghost-btn" id="signIn">SIGN IN</button>
        </div>
        <div class="auth-overlay-panel auth-overlay-right">
          <h1 style="color: white; margin-bottom: 16px;">Halo, Teman!</h1>
          <p style="color: white; font-size: 15px; margin-bottom: 24px; line-height: 1.5;">Daftarkan diri anda dan mulai gunakan<br>layanan kami segera</p>
          <button class="btn ghost-btn" id="signUp">SIGN UP</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const signUpButton = document.getElementById('signUp');
      const signInButton = document.getElementById('signIn');
      const container = document.getElementById('authContainer');
      const loginBtn = document.getElementById('loginBtn');

      // Animasi panel ke Sign Up (Kanan)
      signUpButton.addEventListener('click', () => {
        container.classList.add("right-panel-active");
      });

      // Animasi panel kembali ke Sign In (Kiri)
      signInButton.addEventListener('click', () => {
        container.classList.remove("right-panel-active");
      });

      // Simulasi tombol login masuk ke Dashboard
      loginBtn.addEventListener('click', () => {
        loginBtn.innerText = "Memproses...";
        loginBtn.style.opacity = "0.7";
        
        setTimeout(() => {
          alert("Login Berhasil! Mengarahkan ke Dashboard...");
          window.location.href = "user-dashboard.html"; 
        }, 800);
      });
    });
  </script>
</body>
</html>
