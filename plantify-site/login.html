<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantify - Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="centered">
  <main class="login-card">
    <p class="soft" style="font-weight:700;">WELCOME BACK</p>
    <h1>Sign in</h1>
    <p class="soft">Masuk untuk mengakses meal planner dan dashboard.</p>

    <div class="field">
      <label>Email</label>
      <input type="email" value="admin@gmail.com" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" value="password123" />
    </div>

    <div class="error">Invalid email or password</div>

    <div style="display:flex;gap:10px;margin-top:18px;">
      <button class="btn btn-primary" style="flex:1;">Sign in</button>
      <a class="btn btn-accent" href="index.html">Back</a>
    </div>

    <p class="soft" style="margin-top:14px;">Belum punya akun? <strong>Sign up</strong></p>
  </main>
</body>
</html>
